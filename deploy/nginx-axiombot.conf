server {
    listen 80;
    server_name _;

    root /opt/axiombot/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /state.json {
        alias /opt/axiombot/data/state.json;
        add_header Cache-Control "no-store";
        default_type application/json;
    }
}
