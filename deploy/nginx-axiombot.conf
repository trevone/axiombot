# Include these locations inside the existing bossbot.online server block.
#
# The HUD will be available at:
#   https://bossbot.online/axiombot/

location = /axiombot {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;
    return 301 /axiombot/;
}

location ^~ /axiombot/ {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;
    alias /var/www/axiombot/public/;
    index index.html;
    try_files $uri $uri/ /axiombot/index.html;
}

location = /axiombot/state.json {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;
    alias /var/www/axiombot/state.json;
    add_header Cache-Control "no-store";
    default_type application/json;
}
