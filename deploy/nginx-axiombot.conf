# Include these locations inside the existing bossbot.online server block.
#
# The HUD will be available at:
#   https://bossbot.online/axiombot/

location = /axiombot {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;
    return 301 /axiombot/;
}

location ^~ /axiombot/ {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;
    alias /var/www/axiombot/public/;
    index index.html;
    try_files $uri $uri/ /axiombot/index.html;
}

location = /axiombot/state.json {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;
    alias /var/www/axiombot/state.json;
    add_header Cache-Control "no-store";
    default_type application/json;
}

location = /axiombot/api/state.json {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;
    alias /var/www/axiombot/state.json;
    add_header Cache-Control "no-store";
    default_type application/json;
}

location = /axiombot/api/health.json {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;
    alias /var/www/axiombot/health.json;
    add_header Cache-Control "no-store";
    default_type application/json;
}

location ^~ /axiombot/api/ {
    auth_basic "Kalshi Bot HUD";
    auth_basic_user_file /etc/nginx/.kalshi-hud.htpasswd;

    proxy_pass http://127.0.0.1:8795/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
